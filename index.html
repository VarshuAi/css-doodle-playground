<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Doodle Sandbox — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">🎨</span>
                <div class="title-col">
                    <h1>CSS Doodle Sandbox</h1>
                    <p class="tagline">Sandbox showing complex patterns generated with pure CSS.</p>
                </div>
            </div>
            <div class="badge">media</div>
        </header>

        <main class="workspace-card">
            
            <div style="height:120px; width:120px; margin:auto; border-radius:50%; background:radial-gradient(circle, var(--accent) 10%, transparent 11%), radial-gradient(circle, violet 5%, transparent 6%); background-size: 20px 20px;"></div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
